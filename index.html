<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>pdv alimentos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f7;--surface:#ffffff;--border:#e0e0e0;--text:#1d1d1f;--text2:#6e6e73;
  --blue:#185FA5;--green:#0F6E56;--orange:#BA7517;--red:#E24B4A;
  --info-bg:#EBF2FA;--info-c:#185FA5;--warn-bg:#FEF3E2;--warn-c:#854F0B;
  --success-bg:#E8F5E9;--success-c:#2E7D32;--danger-bg:#FEECEC;--danger-c:#C62828;
  --sobra-bg:#F3E5F5;--sobra-c:#6A1B9A;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;-webkit-tap-highlight-color:transparent}
input,select,button{font-family:inherit;outline:none;border:0.5px solid var(--border);border-radius:8px;padding:10px 12px;background:var(--surface);color:var(--text)}
input:focus,select:focus{border-color:var(--blue)}
input[type="text"] { text-transform: lowercase; }
.app{max-width:100%;width:100%;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}
@media(min-width:768px){.app{max-width:1024px}}
.hdr{background:var(--surface);border-bottom:0.5px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100}
.hdr h1{font-size:16px;font-weight:600;text-transform: lowercase;}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.sdot.off{background:var(--red)}
.sdot.busy{background:var(--orange);animation:blink .7s infinite alternate}
@keyframes blink{to{opacity:.2}}
.pvbadge{font-size:11px;background:var(--info-bg);color:var(--info-c);padding:3px 10px;border-radius:20px;margin-left:auto;cursor:pointer;white-space:nowrap;text-transform: lowercase;}
.nav{display:flex;background:var(--surface);border-top:0.5px solid var(--border);position:sticky;bottom:0;z-index:100}
.nav button{flex:1;padding:10px 4px 8px;border:none;background:none;font-size:10px;color:var(--text2);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-radius:0;text-transform: lowercase;}
.nav button.active{color:var(--blue)}
.nav button svg{width:22px;height:22px}
.screen{display:none;flex:1;flex-direction:column;overflow-y:auto}
.screen.active{display:flex}

/* PDV RESPONSIVO HORIZONTAL */
.pdv-container{display:flex;flex-direction:column;flex:1}
@media(min-width:600px) and (orientation: landscape){
  .pdv-container{flex-direction:row;overflow:hidden;height:calc(100vh - 96px)}
  #screen-pdv{overflow:hidden}
  .pdv-top{flex:1;overflow-y:auto;border-right:0.5px solid var(--border);border-bottom:none}
  .cart-wrapper{width:340px;display:flex;flex-direction:column;background:var(--surface);overflow-y:auto}
}
.pdv-top{padding:12px 16px;background:var(--surface);border-bottom:0.5px solid var(--border)}
.srow{display:flex;gap:8px;align-items:center}
.srow input{flex:1;font-size:14px}
.xbtn{padding:7px 12px;font-size:12px;white-space:nowrap;cursor:pointer;background:none;border:0.5px solid var(--border);border-radius:8px;color:var(--text);text-transform: lowercase;}
.xbtn.on{background:var(--warn-bg);border-color:var(--orange);color:var(--warn-c)}
.xbtn.sobra-on{background:var(--sobra-bg);border-color:var(--sobra-c);color:var(--sobra-c)}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 0 0}
@media(min-width:768px){.pgrid{grid-template-columns:1fr 1fr 1fr}}
@media(min-width:1024px){.pgrid{grid-template-columns:1fr 1fr 1fr 1fr}}

/* CARDS DE PRODUTO */
.pc{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:12px;cursor:pointer;position:relative;overflow:hidden;transition:all .1s;text-transform: lowercase;}
.pc:active{transform:scale(.96)}
.pc .pn{font-size:12.5px;font-weight:600;margin-bottom:3px;line-height:1.3;padding-right:28px}
.pc .pf{font-size:11px;color:var(--text2);margin-bottom:6px}
.pc .pp{font-size:16px;font-weight:600;color:var(--blue)}
.pc .pe{font-size:11px;color:var(--text2);margin-top:4px}
.pc .ai{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;background:var(--info-bg);color:var(--info-c);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:300}

/* DESTAQUE SELECIONADO / NO CARRINHO */
.pc.selected-cart{background:var(--success-bg);border-color:var(--success-c)}
.pc.selected-cart .ai{background:var(--success-c);color:#fff;font-weight:600}

.xt{font-size:10px;display:inline-block;background:var(--warn-bg);color:var(--warn-c);padding:1px 6px;border-radius:20px;margin-top:3px;text-transform: lowercase;}
.st-badge{font-size:10px;display:inline-block;background:var(--sobra-bg);color:var(--sobra-c);padding:1px 6px;border-radius:20px;margin-top:3px;text-transform: lowercase;}

.cart-area{padding:8px 16px;flex:1}
.empty{text-align:center;padding:50px 20px;color:var(--text2);font-size:14px;text-transform: lowercase;}
.ci{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;text-transform: lowercase;}
.ci .cn{font-size:14px;font-weight:600;flex:1}
.ci .cp{font-size:13px;color:var(--text2)}
.qc{display:flex;align-items:center;gap:6px}
.qc button{width:30px;height:30px;border-radius:50%;border:0.5px solid var(--border);background:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text);padding:0}
.qc span{font-size:15px;font-weight:600;min-width:24px;text-align:center}
.rmb{background:none;border:none;cursor:pointer;color:var(--red);font-size:20px;padding:0;border-radius:0}
.tarea{background:var(--surface);border-top:0.5px solid var(--border);padding:12px 16px;text-transform: lowercase;}
.trow{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.tlabel{font-size:14px;color:var(--text2)}
.tval{font-size:24px;font-weight:700}
.pgrid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.pb{padding:11px;border:0.5px solid var(--border);border-radius:8px;background:none;font-size:13px;cursor:pointer;color:var(--text);text-transform: lowercase;}
.pb.sel{background:var(--info-bg);border-color:var(--blue);color:var(--blue);font-weight:600}
.finbtn{width:100%;padding:14px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;text-transform: lowercase;}
.finbtn:disabled{background:#aaa;cursor:not-allowed}
.cli-badge{font-size:12px;color:var(--text2);text-align:center;margin-bottom:8px;padding:6px;background:var(--bg);border-radius:8px}

/* CADASTRO */
.cadform{padding:16px;display:flex;flex-direction:column;gap:12px;text-transform: lowercase;}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:13px;color:var(--text2);font-weight:500}
.field input{font-size:14px;width:100%}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(min-width:600px){.f3-cad{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.f2{display:contents}}
.cadbtn{padding:14px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;text-transform: lowercase;}
.cadbtn.edit{background:var(--green)}
.cancelbtn{padding:14px;background:none;border:0.5px solid var(--border);border-radius:10px;font-size:15px;cursor:pointer;color:var(--text);text-transform: lowercase;}
.sectitle{font-size:13px;color:var(--text2);font-weight:500;padding:4px 16px;margin-bottom:-4px;text-transform: lowercase;}
.clist{padding:12px 16px;display:flex;flex-direction:column;gap:8px;text-transform: lowercase;}
.cadi{background:var(--surface);border:0.5px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:8px}
.cadi.sem-estoque{opacity:.5}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.tag{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bg);color:var(--text2)}
.tag.zero{background:var(--danger-bg);color:var(--danger-c)}
.editbtn{background:none;border:0.5px solid var(--border);border-radius:8px;cursor:pointer;color:var(--blue);font-size:12px;padding:5px 10px;white-space:nowrap}
.delbtn{background:none;border:none;cursor:pointer;color:var(--red);font-size:20px;padding:0;border-radius:0}

/* CONFIG & RELATORIOS */
.cfgwrap, .relwrap{padding:16px;display:flex;flex-direction:column;gap:12px;text-transform: lowercase;}
.cfgcard, .rcard{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:16px}
.cfgcard h3, .rcard h3{font-size:15px;font-weight:600;margin-bottom:8px}
.cfgcard p{font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.6}
.cfgcard input{font-size:13px;width:100%;margin-bottom:10px}
.gbtn{padding:12px;width:100%;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;color:#fff;background:var(--green);margin-bottom:8px}
.sbtn{padding:12px;width:100%;border:0.5px solid var(--border);border-radius:8px;font-size:14px;cursor:pointer;color:var(--text);background:none}
.slog{font-size:11px;color:var(--text2);margin-top:10px;line-height:1.6;max-height:120px;overflow-y:auto;background:var(--bg);padding:8px;border-radius:8px;white-space:pre-wrap}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 12px;border-radius:20px;background:var(--success-bg);color:var(--success-c);font-weight:500}
.pill.err{background:var(--danger-bg);color:var(--danger-c)}
.qwarn{font-size:13px;color:var(--warn-c);font-weight:500}
.pvitems{display:flex;flex-direction:column;gap:8px}
.pvi{padding:13
